<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumphoria - Rezeptbuch</title>
<style>
  /* ====== TOKENS (Jumphoria Gold) ====== */
  :root{
    --cream:#7C9070;
    --paper:#EFE7D8;
    --ink:#F7F3E8;
    --ink-on-paper:#3A4A30;
    --ink-soft:#E8E4D0;
    --pine:#C99A3B;
    --pine-dark:#A87E2A;
    --terracotta:#D97B5E;
    --terracotta-soft:#F3DCD2;
    --line:#D8CFB8;
    --shadow: 0 6px 18px rgba(58,74,48,0.18), 0 1px 3px rgba(58,74,48,0.12);
  }

  *{box-sizing:border-box;}
  html{ overflow-x:hidden; width:100%; }
  img, .card-photo, .detail-photo, .auth-logo, .brand-logo{ max-width:100%; }
  body{
    margin:0;
    overflow-x:hidden;
    width:100%;
    background:var(--cream);
    color:var(--ink);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3, .recipe-title{
    font-family: Georgia, 'Times New Roman', serif;
    letter-spacing:-0.01em;
  }

  .app{
    max-width:1000px !important; width:100% !important; margin:0 auto !important;
    padding:24px 18px 80px !important; box-sizing:border-box !important;
    position:relative !important; left:0 !important; right:0 !important;
  }

  /* ====== HEADER ====== */
  .top{
    display:flex !important; align-items:center !important; justify-content:space-between !important;
    margin-bottom:28px !important; flex-wrap:wrap !important; gap:12px !important; width:100% !important;
  }
  .brand{ display:flex !important; align-items:center !important; gap:10px !important; }
  .brand-logo{ height:75px !important; width:auto !important; max-width:280px !important; display:block !important; image-rendering:high-quality; }
  .auth-logo{ height:130px !important; width:auto !important; max-width:340px !important; display:block !important; margin:0 auto 18px !important; image-rendering:high-quality; border-radius:16px; background:var(--ink-on-paper); padding:12px 20px; }
  .user-pill{
    display:flex; align-items:center; gap:10px;
    font-size:13px; color:var(--ink-soft);
  }
  .btn-ghost{
    background:none; border:1px solid var(--line); color:var(--ink-soft);
    padding:7px 14px; border-radius:20px; cursor:pointer; font-size:13px;
  }
  .btn-ghost:hover{ border-color:var(--terracotta); color:var(--terracotta); }

  /* ====== BUTTONS ====== */
  .btn{
    background:var(--pine); color:#fff; border:none;
    padding:11px 20px; border-radius:10px; font-size:14px;
    cursor:pointer; font-weight:600; transition:transform .08s ease, background .15s;
  }
  .btn:hover{ background:var(--pine-dark); }
  .btn:active{ transform:scale(0.98); }
  .btn-outline{
    background:transparent; color:var(--pine); border:1.5px solid var(--pine);
    padding:9px 18px; border-radius:10px; font-size:14px; cursor:pointer; font-weight:600;
  }
  .btn-outline:hover{ background:var(--pine); color:#fff; }
  .btn-danger{ color:var(--terracotta); background:none; border:none; cursor:pointer; font-size:13px; }
  .btn-block{ width:100%; }

  /* ====== AUTH CARD ====== */
  .auth-wrap{ display:flex; justify-content:center; padding-top:40px; }
  .auth-card{
    background:var(--ink-on-paper); border-radius:18px; padding:36px 32px;
    box-shadow:var(--shadow); max-width:380px; width:100%;
    border:1px solid var(--line);
  }
  .auth-card h2{ font-size:24px; margin:0 0 4px; color:var(--paper); }
  .auth-sub{ color:var(--paper); opacity:0.9; font-size:14px; margin:0 0 24px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; color:var(--ink); opacity:0.85; margin-bottom:6px; font-weight:600; }
  .field input, .field select, .field textarea{
    width:100%; padding:11px 13px; border-radius:9px; border:1.5px solid var(--line);
    background:#fff; font-size:14px; color:var(--ink-on-paper); font-family:inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--pine);
  }
  .auth-toggle{ text-align:center; margin-top:18px; font-size:13.5px; color:var(--ink); opacity:0.75; }
  .auth-toggle a{ color:var(--paper); font-weight:600; cursor:pointer; text-decoration:none; }
  .auth-error{
    background:#6B3530; color:#F5D5C8; border-radius:8px;
    padding:9px 12px; font-size:13px; margin-bottom:14px;
  }

  /* ====== MAIN TABS ====== */
  .main-tabs{
    display:flex; gap:0; margin-bottom:22px;
    background:rgba(0,0,0,0.12); border-radius:14px; padding:4px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .main-tabs::-webkit-scrollbar{ display:none; }
  .main-tab{
    flex:0 0 auto; background:none; border:none; padding:10px 12px;
    font-size:12px; font-weight:700; color:var(--ink); opacity:0.6; cursor:pointer;
    border-radius:11px; font-family:inherit; text-align:center; transition:all .15s;
    white-space:nowrap;
  }
  .main-tab.active{
    opacity:1; color:var(--ink-on-paper);
    background:var(--paper); box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }

  /* ====== TODAY VIEW ====== */
  .today-summary{
    background:var(--paper); border-radius:16px; padding:18px 20px;
    margin-bottom:20px; box-shadow:var(--shadow); border:1px solid var(--line);
  }
  .today-summary h3{ color:var(--pine-dark); font-size:16px; margin:0 0 12px; }
  .today-list{ display:flex; flex-direction:column; gap:10px; }
  .today-entry{
    background:var(--paper); border-radius:14px; padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between;
    border:1px solid var(--line);
  }
  .today-entry-info{ display:flex; flex-direction:column; gap:3px; }
  .today-entry-info.today-entry-clickable{ cursor:pointer; }
  .today-entry-info.today-entry-clickable:hover strong{ color:var(--pine-dark); text-decoration:underline; }
  .today-entry-info strong{ color:var(--ink-on-paper); font-size:15px; }
  .today-entry-info span{ color:var(--ink-on-paper); opacity:0.7; font-size:13px; }
  .today-remove{
    background:none; border:none; color:var(--ink-on-paper); opacity:0.5;
    cursor:pointer; font-size:15px; padding:6px;
  }
  .today-remove:hover{ color:var(--terracotta); opacity:1; }
  .today-swap{
    background:none; border:none; color:var(--ink-on-paper); opacity:0.5;
    cursor:pointer; font-size:15px; padding:6px;
  }
  .today-swap:hover{ color:var(--pine); opacity:1; }
  .today-add-btn{
    width:100%; margin-top:10px; background:var(--terracotta-soft); color:var(--pine-dark);
    border:none; border-radius:10px; padding:9px; font-size:13px; font-weight:600;
    cursor:pointer; font-family:inherit;
  }
  .today-add-btn:hover{ background:var(--terracotta); color:#fff; }

  /* ====== WEEK VIEW ====== */
  .week-list{ display:flex; flex-direction:column; gap:14px; }
  .week-day{
    background:var(--paper); border-radius:16px; padding:16px 18px;
    border:1px solid var(--line); box-shadow:var(--shadow);
  }
  .week-day.is-today{ border:2px solid var(--pine); }
  .week-day-header{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
  }
  .week-day-header h4{ margin:0; color:var(--pine-dark); font-size:15px; font-family:inherit; }
  .week-day-kcal{ color:var(--ink-on-paper); opacity:0.7; font-size:12.5px; font-weight:600; }
  .week-day-macros{ display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .week-day-macro-detail{ color:var(--ink-on-paper); opacity:0.55; font-size:11px; font-weight:500; }
  .week-day-empty{ color:var(--ink-on-paper); opacity:0.5; font-size:13px; margin:0; font-style:italic; }

  /* ====== PLAN POPUP ====== */
  .plan-modal{ max-width:380px; }
  .day-pick-row{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .day-pick{
    flex:1; min-width:40px; padding:10px 4px; border-radius:10px;
    border:1.5px solid var(--line); background:#fff; color:var(--ink-on-paper);
    font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .day-pick.active{ background:var(--pine); border-color:var(--pine); color:#fff; }

  /* ====== DAY PLANS ====== */
  .dayplan-target-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:14px;
  }
  .dayplan-target-card{
    background:var(--paper); border:1.5px solid var(--line); border-radius:16px;
    padding:24px 16px; text-align:center; cursor:pointer; box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:4px; font-family:inherit;
  }
  .dayplan-target-card strong{ font-size:28px; color:var(--pine-dark); font-family:Georgia,serif; }
  .dayplan-target-card span{ color:var(--ink-on-paper); opacity:0.7; font-size:12.5px; }
  .dayplan-target-card small{ color:var(--ink-on-paper); opacity:0.55; font-size:11.5px; margin-top:6px; }
  .dayplan-detail-header{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
    gap:10px; margin-bottom:18px;
  }
  .dayplan-detail-header h3{ color:var(--ink); font-family:Georgia,serif; font-size:19px; margin:0; flex:1 1 100%; order:-1; }
  .dayplan-card{
    background:var(--paper); border-radius:16px; padding:16px 18px; margin-bottom:14px;
    border:1px solid var(--line); box-shadow:var(--shadow);
  }
  .dayplan-card-header{
    display:flex; align-items:center; gap:10px; margin-bottom:12px;
  }
  .dayplan-card-header strong{ color:var(--ink-on-paper); font-size:15.5px; flex:1; }
  .dayplan-card-header span{ color:var(--pine-dark); font-size:12.5px; font-weight:700; }
  .dayplan-slot{
    display:flex; align-items:center; gap:10px; padding:9px 0;
    border-top:1px solid var(--line);
  }
  .dayplan-slot:first-of-type{ border-top:none; }
  .dayplan-slot-label{
    width:75px; flex-shrink:0; font-size:12px; font-weight:700; color:var(--ink-on-paper); opacity:0.6;
    text-transform:uppercase;
  }
  .dayplan-slot-recipe{ flex:1; color:var(--ink-on-paper); font-size:14px; }
  .dayplan-swap-btn{ font-size:12px; padding:6px 12px; flex-shrink:0; }

  /* ====== RECIPE PICKER ====== */
  .picker-list{ display:flex; flex-direction:column; gap:8px; max-height:50vh; overflow-y:auto; }
  .picker-item{
    display:flex; justify-content:space-between; align-items:center; width:100%;
    background:#fff; border:1.5px solid var(--line); border-radius:10px; padding:11px 14px;
    cursor:pointer; font-family:inherit; color:var(--ink-on-paper); font-size:14px;
  }
  .picker-item:hover{ border-color:var(--pine); }
  .picker-kcal{ color:var(--pine-dark); font-size:12px; font-weight:700; }

  /* ====== SHOPPING LIST ====== */
  .shopping-list{ display:flex; flex-direction:column; gap:8px; width:100%; }
  .shopping-item{
    display:flex; align-items:center; gap:12px; background:var(--paper);
    border-radius:12px; padding:13px 16px; cursor:pointer; border:1px solid var(--line);
    width:100%;
  }
  .shopping-item input{ display:none; }
  .shopping-check-icon{
    width:22px; height:22px; border-radius:50%; border:2px solid var(--pine);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-size:13px; color:#fff; font-weight:700;
  }
  .shopping-item.is-checked .shopping-check-icon{ background:var(--pine); }
  .shopping-text{
    color:var(--ink-on-paper); font-size:14.5px;
    flex:1 1 auto; min-width:0; word-break:normal; overflow-wrap:break-word;
  }
  .shopping-item.is-checked .shopping-text{ text-decoration:line-through; opacity:0.5; }

  .toolbar{ display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap; align-items:center; }
  .search-input{
    flex:1; min-width:160px; padding:11px 14px; border-radius:10px;
    border:1.5px solid var(--line); font-size:14px; background:var(--paper);
  }
  .search-input:focus{ outline:none; border-color:var(--pine); }
  .tag-filters{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .tag-chip{
    padding:7px 14px; border-radius:20px; font-size:12px; cursor:pointer;
    border:1.5px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.15);
    color:var(--ink); font-weight:600; white-space:nowrap; transition:all .15s;
  }
  .tag-chip.active{ background:var(--terracotta); border-color:var(--terracotta); color:#fff; }
  .kcal-chip{ border-style:dashed; border-color:rgba(255,255,255,0.4); }
  .kcal-chip.active{ background:var(--pine); border-color:var(--pine); border-style:solid; color:#fff; }

  /* ====== RECIPE GRID ====== */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:20px; margin-top:8px;
  }
  .card{
    background:var(--paper); border-radius:16px; overflow:hidden;
    box-shadow:var(--shadow); cursor:pointer; position:relative;
    border:1px solid var(--line); transition:transform .12s ease;
  }
  .card:hover{ transform:translateY(-3px); }
  .card-hole{
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    width:14px; height:14px; border-radius:50%; background:var(--cream);
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.15); z-index:2;
  }
  .card-photo{
    width:100%; height:140px; object-fit:cover; background:var(--terracotta-soft);
    display:block;
  }
  .card-photo.empty{
    display:flex; align-items:center; justify-content:center;
    color:var(--terracotta); font-size:30px;
  }
  .kcal-badge{
    position:absolute; top:10px; right:10px; z-index:2;
    background:rgba(255,255,255,0.92); color:var(--ink-on-paper);
    font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  .card-body{ padding:16px 16px 18px; }
  .card-body .recipe-title{ font-size:17px; margin:0 0 8px; color:var(--ink-on-paper); line-height:1.25; }
  .card-tags{ display:flex; gap:5px; flex-wrap:wrap; }
  .tag-badge{
    font-size:11px; font-weight:700; padding:3px 9px; border-radius:12px;
    background:var(--terracotta-soft); color:var(--terracotta); text-transform:uppercase;
    letter-spacing:.03em;
  }
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft);
  }
  .empty-state h3{ color:var(--pine-dark); margin-bottom:6px; }

  /* ====== FAB ====== */
  .fab{
    position:fixed; bottom:26px; right:26px; width:58px; height:58px;
    border-radius:50%; background:var(--terracotta); color:#fff;
    font-size:28px; border:none; box-shadow:var(--shadow); cursor:pointer;
    display:flex; align-items:center; justify-content:center; line-height:0;
  }
  .fab:hover{ background:var(--pine-dark); }

  /* ====== MODAL ====== */
  .overlay{
    position:fixed; inset:0; background:rgba(51,41,31,0.45);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:50; overflow:hidden;
  }
  .modal{
    background:var(--paper); border-radius:18px 18px 0 0; max-width:560px; width:100%;
    height:90vh; overflow-y:scroll; -webkit-overflow-scrolling:touch;
    padding:30px 28px 40px; box-shadow:var(--shadow); position:relative;
    overscroll-behavior:contain;
  }
  .modal h2{ color:var(--pine-dark); margin:0 0 18px; font-size:22px; }
  .modal-close{
    position:absolute; top:18px; right:18px; background:none; border:none;
    font-size:20px; color:var(--ink-on-paper); opacity:0.6; cursor:pointer;
  }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .photo-drop{
    border:2px dashed var(--line); border-radius:12px; padding:18px;
    text-align:center; color:var(--ink-on-paper); opacity:0.75; font-size:13px; cursor:pointer;
    margin-bottom:14px; position:relative; overflow:hidden;
  }
  .photo-drop img{ max-width:100%; max-height:160px; border-radius:8px; display:block; margin:0 auto; }
  .photo-drop input{ display:none; }
  .tag-select-row{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .ingredient-row{ display:flex; gap:6px; margin-bottom:8px; align-items:center; }
  .macro-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .macro-field{ display:flex; flex-direction:column; gap:4px; flex:1; min-width:70px; }
  .macro-field span{ font-size:11px; color:var(--ink-on-paper); opacity:0.65; font-weight:600; }
  .macro-field input{
    padding:8px 9px; border-radius:8px; border:1.5px solid var(--line);
    background:#fff; color:var(--ink-on-paper); font-size:13.5px; font-family:inherit; width:100%;
  }
  .ingredient-row input, .ingredient-row select{
    padding:9px 10px; border-radius:8px; border:1.5px solid var(--line);
    background:#fff; color:var(--ink-on-paper); font-size:13.5px; font-family:inherit;
  }
  .ing-remove{
    background:none; border:none; color:var(--ink-on-paper); opacity:0.6; cursor:pointer; font-size:15px;
    padding:4px 8px; flex-shrink:0;
  }
  .ing-remove:hover{ color:var(--terracotta); opacity:1; }
  .tag-pick{
    padding:6px 13px; border-radius:20px; font-size:12.5px; cursor:pointer;
    border:1.5px solid var(--line); background:#fff; color:var(--ink-on-paper); font-weight:600;
  }
  .tag-pick.active{ background:var(--pine); border-color:var(--pine); color:#fff; }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }

  /* ====== DETAIL VIEW ====== */
  .detail-photo{ width:100%; max-height:280px; object-fit:cover; border-radius:14px; margin-bottom:18px; }
  .servings-stepper{
    display:flex; align-items:center; gap:12px; margin-bottom:18px;
    color:var(--ink-on-paper); opacity:0.85; font-size:14px; font-weight:600;
  }
  .stepper-btn{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--pine);
    background:transparent; color:var(--pine-dark); font-size:17px; font-weight:700;
    cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:0; padding:0;
  }
  .stepper-btn:hover{ background:var(--pine); color:#fff; }
  .servings-value{ min-width:18px; text-align:center; font-size:16px; }
  .macro-summary{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .macro-pill{
    background:var(--cream); border-radius:10px; padding:8px 12px;
    display:flex; flex-direction:column; align-items:center; min-width:62px;
  }
  .macro-pill strong{ color:var(--ink); font-size:15px; line-height:1.2; }
  .macro-pill span{ color:var(--ink); opacity:0.75; font-size:10.5px; text-transform:uppercase; letter-spacing:.02em; }
  .detail-section{ margin-bottom:18px; }
  .detail-section h4{
    font-size:12.5px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--terracotta); margin:0 0 8px; font-family:inherit; font-weight:700;
  }
  .detail-section p, .detail-section li{ font-size:14.5px; line-height:1.6; color:var(--ink-on-paper); }
  .detail-section ul{ padding-left:20px; margin:0; }
  .detail-section .ztext{ white-space:pre-wrap; margin:0; }

  .loading{ text-align:center; padding:60px; color:var(--ink-soft); }
  @media (max-width:480px){
    .row2{ grid-template-columns:1fr; }
  }
.ing-estimate{ color:#999; font-size:0.9em; font-style:italic; }
</style>
</head>

<script>

function debugUserId(){ if(state.user) console.log("Eingeloggt als:", state.user.id, "| Admin?", state.user.id === ADMIN_USER_ID); }
const ALL_TAGS = ["Vegan","Vegetarisch","Frühstück","Hauptgericht","Snack","Dessert","Low Carb","High Protein","Meal Prep","Schnell","Airfryer","Pre Workout","Post Workout"];
const KCAL_BANDS = ["100 kcal","200 kcal","300 kcal","400 kcal"];
const DAYPLAN_TARGETS = [1200, 1400, 1600, 1800];
const WEEKDAY_NAMES = ["Mo","Di","Mi","Do","Fr","Sa","So"];

// ── NUR diese Felder für die Listenansicht laden (spart ~70% Egress) ──
const LIST_COLUMNS = "id,title,kcal,protein,carbs,fat,tags,photo_url,servings,meal_type,created_at";

function getKcalBand(kcal, servings){
  if(kcal == null) return null;
  const perServing = servings ? kcal / servings : kcal;
  if(perServing < 150) return "100 kcal";
  if(perServing < 250) return "200 kcal";
  if(perServing < 350) return "300 kcal";
  return "400 kcal";
}

function getCurrentWeekDates(){
  const today = new Date();
  const dayOfWeek = today.getDay();
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  const dates = [];
  for(let i = 0; i < 7; i++){
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

function renderAuth(){
  const isLogin = state.view === "login";
  return `

        ${state.serviceDown ? `<div class="auth-error">&#9888;&#65039; Dienst momentan nicht erreichbar. Bitte in ein paar Minuten erneut versuchen.</div>` : ""}
        <form id="auth-form">

          <div class="field"><label>Passwort</label><input type="password" id="auth-password" required placeholder="Mindestens 6 Zeichen" minlength="6"></div>
          <button type="submit" class="btn btn-block">${isLogin ? "Anmelden" : "Registrieren"}</button>
        </form>
        <div class="auth-toggle">
          ${isLogin ? `Noch kein Konto? <a id="to-register">Jetzt registrieren</a>` : `Schon registriert? <a id="to-login">Zum Login</a>`}
        </div>
      </div>
    </div>`;
}

function bindAuthEvents(){
  document.getElementById("auth-form").addEventListener("submit", async (e)=>{
    e.preventDefault();
    state.error = "";
    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    const submitBtn = e.target.querySelector("button");
    submitBtn.disabled = true; submitBtn.textContent = "Einen Moment \u2026";
    try{
      if(state.view === "login"){
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if(error) throw error;
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if(error) throw error;
        alert("Konto erstellt! Falls eine Best\u00e4tigungsmail n\u00f6tig ist, pr\u00fcfe dein Postfach.");
        state.view = "login"; render(); return;
      }
      await checkSession();
    }catch(err){ state.error = translateError(err.message); render(); }
  });
  const toReg = document.getElementById("to-register");
  if(toReg) toReg.addEventListener("click", ()=>{ state.view="register"; state.error=""; render(); });
  const toLogin = document.getElementById("to-login");
  if(toLogin) toLogin.addEventListener("click", ()=>{ state.view="login"; state.error=""; render(); });
}

function translateError(msg){
  if(!msg) return "Etwas ist schiefgelaufen.";
  if(msg.includes("Invalid login credentials")) return "E-Mail oder Passwort ist falsch.";
  if(msg.includes("already registered")) return "Diese E-Mail ist schon registriert.";
  if(msg.includes("Password")) return "Das Passwort muss mindestens 6 Zeichen haben.";
  return msg;
}

function renderWeek(){
  const entries = state.weekLog || [];
  const weekDates = getCurrentWeekDates();
  const header = `

      <button type="button" class="btn" id="auto-week-btn" style="flex:1; min-width:180px;">&#x2728; Woche automatisch planen</button>
      ${entries.length > 0 ? `<button type="button" class="btn-danger" id="clear-week-btn">Woche leeren</button>` : ''}
    </div>`;
  if(entries.length === 0){
    return header + `<div class="empty-state"><h3>Noch nichts für diese Woche geplant</h3><p>Tippe auf "Woche automatisch planen" oder geh zu "Rezepte" und tippe bei einem Rezept auf "+ Geplant".</p></div>`;
  }
  return header + `<div class="week-list">${weekDates.map((date, idx) => {
    const dayEntries = entries.filter(e => e.log_date === date);
    let kcalSum=0, proteinSum=0, carbsSum=0, fatSum=0;
    dayEntries.forEach(e => {
      const recipe = state.recipes.find(r => r.id === e.recipe_id);
      if(!recipe) return;
      const factor = e.servings_logged / (recipe.servings || 1);
      if(recipe.kcal != null) kcalSum += recipe.kcal * factor;
      if(recipe.protein != null) proteinSum += recipe.protein * factor;
      if(recipe.carbs != null) carbsSum += recipe.carbs * factor;
      if(recipe.fat != null) fatSum += recipe.fat * factor;
    });
    const dateObj = new Date(date + "T00:00:00");
    const dayLabel = WEEKDAY_NAMES[idx] + ", " + dateObj.getDate() + "." + (dateObj.getMonth()+1) + ".";
    const isToday = date === new Date().toISOString().slice(0,10);
    return `
      <div class="week-day ${isToday?'is-today':''}">
        <div class="week-day-header">
          <h4>${dayLabel}${isToday?' \u2022 heute':''}</h4>
          ${dayEntries.length > 0 ? `<div class="week-day-macros"><span class="week-day-kcal">${Math.round(kcalSum)} kcal</span><span class="week-day-macro-detail">E ${Math.round(proteinSum)}g \u00b7 KH ${Math.round(carbsSum)}g \u00b7 F ${Math.round(fatSum)}g</span></div>` : ""}
        </div>
        ${dayEntries.length === 0 ? `<p class="week-day-empty">Nichts geplant</p>` : `
          <div class="today-list">
            ${dayEntries.map(e => {
              const recipe = state.recipes.find(r => r.id === e.recipe_id);
              if(!recipe) return "";
              const factor = e.servings_logged / (recipe.servings || 1);
              const kcalForEntry = recipe.kcal != null ? Math.round(recipe.kcal * factor) : null;
              return `<div class="today-entry">
                <div class="today-entry-info today-entry-clickable" data-recipe-id="${recipe.id}">
                  <strong>${escapeHtml(recipe.title)}</strong>
                  <span>${e.servings_logged} Portion${e.servings_logged==1?'':'en'}${kcalForEntry!==null?` \u00b7 ${kcalForEntry} kcal`:''}</span>
                </div>
                <button type="button" class="today-swap" data-log-id="${e.id}" data-recipe-id="${recipe.id}" title="Rezept tauschen">\u{1F504}</button>
                <button type="button" class="today-remove" data-log-id="${e.id}">\u2715</button>

function buildShoppingItems(){
  const entries = state.weekLog || [];
  const details = state.weekRecipeDetails || {};
  const itemMap = {};
  entries.forEach(e => {
    const recipe = state.recipes.find(r => r.id === e.recipe_id);
    const detail = details[e.recipe_id];
    const ingredientsStructured = detail && detail.ingredients_structured;
    if(!recipe || !ingredientsStructured) return;
    const servings = (detail && detail.servings) || recipe.servings || 1;
    const factor = e.servings_logged / servings;
    ingredientsStructured.forEach(ing => {
      if(!ing.name) return;
      const unit = ing.amount !== null && ing.amount !== undefined ? (ing.unit || "") : "";
      const key = (unit + "_" + ing.name).toLowerCase().replace(/[^a-z0-9_]/g, "");
      if(!itemMap[key]){ itemMap[key] = { key, name: ing.name, unit, amount: 0, hasAmount: ing.amount !== null && ing.amount !== undefined }; }
      if(ing.amount !== null && ing.amount !== undefined){ itemMap[key].amount += ing.amount * factor; }
    });
  });
  return Object.values(itemMap).sort((a,b) => a.name.localeCompare(b.name));
}

function renderSwapPopup(){
  const { logId, recipeId } = state.swapTarget;
  const current = state.recipes.find(r => r.id === recipeId);
  if(!current) return "";
  // Kategorie bestimmen: gleiche Haupt-Tags (Frühstück/Hauptgericht/Snack/Dessert) wie das aktuelle Rezept
  const relevantTags = ['Frühstück','Hauptgericht','Snack','Dessert'];
  const currentCategory = relevantTags.find(t => (current.tags||[]).includes(t));
  const pool = state.recipes.filter(r =>
    r.id !== recipeId &&
    r.kcal != null &&
    (!currentCategory || (r.tags||[]).includes(currentCategory))
  );
  // Nach Kalorien-Nähe zum aktuellen Rezept sortieren, Top 6 als Alternativen anzeigen
  const currentKcalPerServing = current.kcal / (current.servings || 1);
  const alternatives = [...pool]
    .sort((a,b)=>{
      const aKcal = a.kcal/(a.servings||1), bKcal = b.kcal/(b.servings||1);
      return Math.abs(aKcal-currentKcalPerServing) - Math.abs(bKcal-currentKcalPerServing);
    })
    .slice(0, 6);
  return `<div class="overlay" id="swap-overlay"><div class="modal plan-modal">
    <button class="modal-close" id="swap-close">\u2715</button>
    <h2>\u{1F504} Rezept tauschen</h2>
    <p style="color:var(--ink-on-paper); opacity:0.75; font-size:14px; margin:0 0 4px;">Aktuell: <strong>${escapeHtml(current.title)}</strong> (${Math.round(currentKcalPerServing)} kcal)</p>
    <p style="color:var(--ink-on-paper); opacity:0.6; font-size:13px; margin:0 0 14px;">Ähnliche Alternativen${currentCategory ? ` (${currentCategory})` : ''}:</p>
    <div class="picker-list">
      ${alternatives.map(r => {
        const kcalPerServing = Math.round(r.kcal/(r.servings||1));
        return `<button type="button" class="picker-item" data-swap-recipe-id="${r.id}"><span>${escapeHtml(r.title)}</span><span class="picker-kcal">${kcalPerServing} kcal</span></button>`;

      ${alternatives.length === 0 ? `<p style="color:var(--ink-on-paper); opacity:0.6;">Keine passenden Alternativen gefunden.</p>` : ""}
    </div>
  </div></div>`;
}

function calcProfil(){
  const p = state.profil;
  if(!p.alter || !p.groesse || !p.gewicht) return;

  // Grundumsatz (Mifflin-St Jeor)
  let bmr;
  if(p.geschlecht === "w"){
    bmr = 10 * p.gewicht + 6.25 * p.groesse - 5 * p.alter - 161;
  } else {
    bmr = 10 * p.gewicht + 6.25 * p.groesse - 5 * p.alter + 5;
  }

  // Aktivitätsfaktor
  const faktoren = { "wenig": 1.2, "mittel": 1.55, "viel": 1.725 };
  const tdee = Math.round(bmr * (faktoren[p.aktivitaet] || 1.55));

  // Ziel-Anpassung
  let kcal = tdee;
  if(p.ziel === "abnehmen") kcal = Math.round(tdee * 0.85);
  else if(p.ziel === "halten") kcal = tdee;

  // Makros (sportgerecht): 35% Eiweiß, 35% KH, 30% Fett
  // Eiweiß: mind. 1.6g pro kg Körpergewicht (wissenschaftliche Empfehlung für Kraftsport)
  const proteinByWeight = Math.round(p.gewicht * 1.6);
  const proteinByPercent = Math.round((kcal * 0.35) / 4);
  const protein = Math.max(proteinByWeight, proteinByPercent);
  const fat = Math.round((kcal * 0.30) / 9);
  const carbs = Math.round((kcal - protein * 4 - fat * 9) / 4);

  state.profilKcal = kcal;
  state.profilMakros = { protein, carbs, fat };
  localStorage.setItem("jumphoria_profil", JSON.stringify(p));
}

// ── Automatische Gewichtsschätzung für gekochte Portionen ──
const STUECK_GEWICHTE = {
  "zwiebel": 80, "zehe": 5, "knoblauchzehe": 5, "ei": 60, "eiklar": 30,
  "tomate": 120, "paprika": 150, "zucchini": 200, "karotte": 80, "karotten": 80,
  "avocado": 150, "gurke": 300, "scheibe": 30, "dose": 150
};

function estimateCookedWeight(recipe, servings){
  if(!recipe.ingredients_structured || recipe.ingredients_structured.length === 0) return null;
  const scale = servings / (recipe.servings || 1);
  const steps = (recipe.steps || '').toLowerCase();

  // Kochverlust ermitteln
  const isFried = steps.includes('braten') || steps.includes('anbraten');
  const isBoiled = steps.includes('kochen') || steps.includes('köcheln');
  const isSoup = steps.includes('suppe') || steps.includes('wasser') || steps.includes('brühe');
  const hasRice = steps.includes('reis') || steps.includes('nudeln') || steps.includes('linsen');

  let totalRawGrams = 0;
  let liquidGrams = 0;

  recipe.ingredients_structured.forEach(ing => {
    if(!ing.name) return;
    const nameLower = ing.name.toLowerCase();

    // Gramm direkt
    if(ing.unit === 'g' && ing.amount){
      const g = ing.amount * scale;
      // Flüssigkeiten separat
      if(nameLower.includes('wasser') || nameLower.includes('milch') ||
         nameLower.includes('brühe') || nameLower.includes('tomaten') ||
         nameLower.includes('kokosmilch') || nameLower.includes('sauce')){
        liquidGrams += g;
      } else {
        totalRawGrams += g;
      }
    }
    // ml → g (ca. 1:1)
    else if(ing.unit === 'ml' && ing.amount){
      liquidGrams += ing.amount * scale;
    }
    // Stück-Angaben schätzen
    else if(!ing.unit && ing.amount){
      for(const [key, weight] of Object.entries(STUECK_GEWICHTE)){
        if(nameLower.includes(key)){
          totalRawGrams += ing.amount * weight * scale;
          break;
        }
      }
    }
    // TL/EL
    else if(ing.unit === 'TL' && ing.amount){ totalRawGrams += ing.amount * 5 * scale; }
    else if(ing.unit === 'EL' && ing.amount){ totalRawGrams += ing.amount * 15 * scale; }
  });

  // Kochverlust berechnen
  let cookedSolids = totalRawGrams;
  if(isFried) cookedSolids *= 0.80; // -20%
  else if(isBoiled) cookedSolids *= 0.90; // -10%
  if(hasRice) cookedSolids *= 2.5; // Reis/Linsen saugen Wasser auf

  // Flüssigkeit: -10% Reduktion
  const cookedLiquid = liquidGrams * (isSoup ? 0.92 : 0.50);

  const total = Math.round(cookedSolids + cookedLiquid);
  if(total < 50) return null;
  return total;
}

function renderDetail(){
  const r = state.detailRecipe;
  const baseServings = r.servings || 1;
  const currentServings = state.detailServings || baseServings;
  const scale = currentServings / baseServings;

  // Falls Detail noch lädt
  if(r._loading){
    return `<div class="overlay" id="detail-overlay"><div class="modal">
      <button class="modal-close" id="detail-close">\u2715</button>
      <h2>${escapeHtml(r.title)}</h2>
      <div class="loading">Zutaten werden geladen \u2026</div>
    </div></div>`;
  }

  const hasStructured = r.ingredients_structured && r.ingredients_structured.length > 0;
  let ingredientsHtml;
  if(hasStructured){
    ingredientsHtml = r.ingredients_structured.map(ing => {
      if(ing.amount === null || ing.amount === undefined) return `<li>${escapeHtml(ing.name)}</li>`;
      const scaledAmount = ing.amount * scale;
      const displayAmount = scaledAmount % 1 === 0 ? scaledAmount.toFixed(0) : scaledAmount.toFixed(1);
      const unitStr = ing.unit ? ing.unit : '';
      const separator = ing.unit ? '' : ' ';

      // Bei Stück-Angaben (kein unit) Gramm-Schätzung aus STUECK_GEWICHTE ergänzen
      let gramHint = '';
      if(!ing.unit && ing.name){
        const nameLower = ing.name.toLowerCase();
        for(const [key, weight] of Object.entries(STUECK_GEWICHTE)){
          if(nameLower.includes(key)){
            const estGrams = Math.round(scaledAmount * weight);
            gramHint = ` <span class="ing-estimate">(~${estGrams}g)</span>`;
            break;
          }
        }
      }

      return `<li>${displayAmount}${unitStr}${separator}${escapeHtml(ing.name)}${gramHint}</li>`;
    }).join("");
  } else {
    ingredientsHtml = (r.ingredients||"").split("\n").filter(Boolean).map(i=>`<li>${escapeHtml(i)}</li>`).join("");
  }

  return `<div class="overlay" id="detail-overlay"><div class="modal">
    <button class="modal-close" id="detail-close">\u2715</button>
    ${r.photo_url ? `<img class="detail-photo" src="${r.photo_url}" alt="${escapeAttr(r.title)}">` : ""}
    <h2>${escapeHtml(r.title)}</h2>
    <div class="card-tags" style="margin-bottom:10px;">${(r.tags||[]).map(t=>`<span class="tag-badge">${t}</span>`).join("")}</div>
    ${r.servings ? `<div class="servings-stepper"><span>Portionen:</span><button type="button" id="servings-minus" class="stepper-btn">\u2212</button><span class="servings-value">${currentServings}</span><button type="button" id="servings-plus" class="stepper-btn">+</button></div>` : ""}
    ${r.kcal != null ? `<div class="macro-summary">
      <div class="macro-pill"><strong>${Math.round(r.kcal*scale)}</strong><span>kcal</span></div>
      ${r.protein != null ? `<div class="macro-pill"><strong>${Math.round(r.protein*scale)}g</strong><span>Eiwei\u00df</span></div>` : ""}
      ${r.carbs != null ? `<div class="macro-pill"><strong>${Math.round(r.carbs*scale)}g</strong><span>KH</span></div>` : ""}
      ${r.fat != null ? `<div class="macro-pill"><strong>${Math.round(r.fat*scale)}g</strong><span>Fett</span></div>` : ""}
      ${(() => { const w = estimateCookedWeight(r, currentServings); return w ? `<div class="macro-pill"><strong>~${w}g</strong><span>\u{1F963} GEKOCHT</span></div>` : ""; })()}
    </div>` : ""}
    <div class="detail-section"><h4>Zutaten</h4><ul>${ingredientsHtml}</ul></div>
    <div class="detail-section"><h4>Zubereitung</h4><p class="ztext">${escapeHtml(r.steps||"")}</p></div>
    <div class="modal-actions">
      ${state.user && state.user.id === ADMIN_USER_ID ? `<button class="btn-outline" id="edit-from-detail">Bearbeiten</button>` : ""}
    </div>
  </div></div>`;
}

function bindAppEvents(){
  document.getElementById("logout-btn").addEventListener("click", async ()=>{
    await sb.auth.signOut();
    state.user = null; state.recipes = []; state.view = "login"; render();
  });

  document.querySelectorAll(".main-tab").forEach(tab=>{
    tab.addEventListener("click", ()=>{
      state.mainTab = tab.dataset.tab;
      if(state.mainTab === "today") loadWeekLog();
      if(state.mainTab === "shopping"){ loadWeekLog(); loadShoppingChecks(); }
      if(state.mainTab === "dayplans") loadDayPlans();
      if(state.mainTab === "profil") calcProfil();
      render();
    });
  });

  const searchInput = document.getElementById("search-input");
  if(searchInput){
    searchInput.addEventListener("input", (e)=>{
      state.search = e.target.value; render();
      document.getElementById("search-input").focus();
      document.getElementById("search-input").selectionStart = document.getElementById("search-input").value.length;
    });
  }

  document.querySelectorAll("#tag-filters .tag-chip[data-tag]").forEach(chip=>{
    chip.addEventListener("click", ()=>{ state.activeTag = state.activeTag === chip.dataset.tag ? null : chip.dataset.tag; render(); });
  });
  const clearBtn = document.getElementById("clear-tag-filter");
  if(clearBtn) clearBtn.addEventListener("click", ()=>{ state.activeTag=null; render(); });

  document.querySelectorAll("#kcal-filters .kcal-chip[data-band]").forEach(chip=>{
    chip.addEventListener("click", ()=>{ state.activeKcalBand = state.activeKcalBand === chip.dataset.band ? null : chip.dataset.band; render(); });
  });
  const clearKcalBtn = document.getElementById("clear-kcal-filter");
  if(clearKcalBtn) clearKcalBtn.addEventListener("click", ()=>{ state.activeKcalBand=null; render(); });

  const addFab = document.getElementById("add-fab");
  if(addFab){
    addFab.addEventListener("click", ()=>{
      state.modalOpen = true; state.editingRecipe = null; state.photoDataUrl = null; state.photoFile = null; state.uploadedPhotoUrl = null;
      state.selectedTags = []; state.ingredientRows = [{amount:"", unit:"g", name:""}]; render();
    });
  }

  document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", async (e)=>{
      if(e.target.closest(".today-add-btn")) return;
      const baseRecipe = state.recipes.find(r=>r.id === card.dataset.id);
      // Zeige sofort die Karte mit Ladeanzeige
      state.detailRecipe = { ...baseRecipe, _loading: true };
      state.detailServings = baseRecipe.servings || 1;
      render();
      // Lade die vollständigen Daten (ingredients, steps, ingredients_structured)
      const { data, error } = await sb.from("recipes")
        .select("id,title,kcal,protein,carbs,fat,tags,photo_url,servings,meal_type,ingredients,steps,ingredients_structured")
        .eq("id", baseRecipe.id)
        .single();
      if(!error && data){
        state.detailRecipe = data;
        render();
      } else {
        state.detailRecipe = { ...baseRecipe, _loading: false };
        render();
      }
    });
  });

  document.querySelectorAll(".today-add-btn").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      state.planRecipeId = btn.dataset.recipeId;
      state.planSelectedDays = []; render();
    });
  });

  document.querySelectorAll(".today-remove").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const logId = btn.dataset.logId;
      const { error } = await sb.from("daily_log").delete().eq("id", logId);
      if(error){ alert("Fehler: " + error.message); return; }
      await loadWeekLog();
    });
  });

  document.querySelectorAll(".today-swap").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      state.swapTarget = { logId: btn.dataset.logId, recipeId: btn.dataset.recipeId };
      render();
    });
  });

  document.querySelectorAll(".today-entry-clickable").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const baseRecipe = state.recipes.find(r => r.id === el.dataset.recipeId);
      if(!baseRecipe) return;
      state.detailRecipe = { ...baseRecipe, _loading: true };
      state.detailServings = baseRecipe.servings || 1;
      render();
      const { data, error } = await sb.from("recipes")
        .select("id,title,kcal,protein,carbs,fat,tags,photo_url,servings,meal_type,ingredients,steps,ingredients_structured")
        .eq("id", baseRecipe.id).single();
      if(!error && data){ state.detailRecipe = data; render(); }
    });
  });

  document.querySelectorAll(".shopping-checkbox").forEach(cb=>{
    cb.addEventListener("change", async ()=>{
      const key = cb.dataset.key;
      state.shoppingChecks[key] = cb.checked; render();
      try{
        const weekStart = getCurrentWeekDates()[0];
        if(cb.checked){
          await sb.from("shopping_checked").upsert({ user_id: state.user.id, item_key: key, week_start: weekStart, checked: true }, { onConflict: "user_id,item_key,week_start" });
        } else {
          await sb.from("shopping_checked").delete().eq("user_id", state.user.id).eq("item_key", key).eq("week_start", weekStart);
        }
      }catch(err){ console.error(err); }
    });
  });

  document.querySelectorAll(".dayplan-target-card").forEach(card=>{
    card.addEventListener("click", ()=>{ state.activeDayPlanTarget = parseInt(card.dataset.target, 10); render(); });
  });

  const backBtn = document.getElementById("back-to-targets");
  if(backBtn) backBtn.addEventListener("click", ()=>{ state.activeDayPlanTarget = null; render(); });

  const newPlanBtn = document.getElementById("new-dayplan-btn");
  if(newPlanBtn) newPlanBtn.addEventListener("click", async ()=>{
    const title = prompt("Name f\u00fcr diesen Tagesplan:", `${state.activeDayPlanTarget} kcal Tag`);
    if(!title) return;
    const { error } = await sb.from("day_plans").insert({ user_id: state.user.id, title, target_kcal: state.activeDayPlanTarget });
    if(error){ alert("Fehler: " + error.message); return; }
    await loadDayPlans();
  });

  document.querySelectorAll(".dayplan-swap-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{ state.pickerOpen = { dayPlanId: btn.dataset.dayplanId, slot: btn.dataset.slot }; state.pickerSearch = ""; render(); });
  });

  document.querySelectorAll("[data-dayplan-id].today-remove").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(!confirm("Diesen Tagesplan wirklich l\u00f6schen?")) return;
      const { error } = await sb.from("day_plans").delete().eq("id", btn.dataset.dayplanId);
      if(error){ alert("Fehler: " + error.message); return; }
      await loadDayPlans();
    });
  });

  const autoWeekBtn = document.getElementById("auto-week-btn");
  if(autoWeekBtn) autoWeekBtn.addEventListener("click", ()=>{ state.autoWeekOpen = true; render(); });

  const clearWeekBtn = document.getElementById("clear-week-btn");
  if(clearWeekBtn) clearWeekBtn.addEventListener("click", async ()=>{
    if(!confirm("Alle Einträge dieser Woche löschen?")) return;
    const weekDates = getCurrentWeekDates();
    await sb.from("daily_log").delete()
      .eq("user_id", state.user.id)
      .gte("log_date", weekDates[0])
      .lte("log_date", weekDates[6]);
    await loadWeekLog();
  });

  if(state.autoWeekOpen) bindAutoWeekEvents();
  if(state.modalOpen) bindModalEvents();

  // Profil events
  document.querySelectorAll(".profil-pick").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.profil[btn.dataset.field] = btn.dataset.val;
      calcProfil();
      render();
    });
  });
  document.querySelectorAll(".profil-input").forEach(input=>{
    input.addEventListener("change", ()=>{
      state.profil[input.dataset.field] = parseFloat(input.value);
      calcProfil();
      render();
    });
  });
  const useProfilBtn = document.getElementById("use-profil-kcal");
  if(useProfilBtn){
    useProfilBtn.addEventListener("click", ()=>{
      state.mainTab = "today";
      state.autoWeekOpen = true;
      render();
    });
  }
  if(state.detailRecipe) bindDetailEvents();
  if(state.planRecipeId) bindPlanPopupEvents();
  if(state.pickerOpen) bindRecipePickerEvents();
  if(state.swapTarget) bindSwapEvents();
}

function bindAutoWeekEvents(){
  const overlay = document.getElementById("autoweek-overlay");
  if(!overlay) return;
  overlay.addEventListener("click", (e)=>{ if(e.target.id==="autoweek-overlay"){ state.autoWeekOpen=false; render(); } });
  document.getElementById("autoweek-close").addEventListener("click", ()=>{ state.autoWeekOpen=false; render(); });

  document.querySelectorAll("[data-kcal]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const targetKcal = parseInt(btn.dataset.kcal);
      state.autoWeekOpen = false;
      btn.disabled = true;

      const weekDates = getCurrentWeekDates();
      const allRecipes = state.recipes.filter(r => r.kcal != null && r.servings != null);
      if(allRecipes.length === 0){ alert("Keine Rezepte mit Kalorienangaben gefunden."); return; }

      // Kalorienbasierte Auswahl: pro Slot das Rezept wählen, dessen kcal
      // am nächsten am Slot-Ziel liegt (statt komplett zufällig).
      // Damit sich Rezepte über die Woche abwechseln, werden bereits
      // verwendete Rezepte erst nach Ausschöpfen des Pools wiederholt.
      function pickClosest(pool, target, usedCounts){
        if(pool.length === 0) return null;
        // Sortiere nach: zuerst wie oft schon verwendet (weniger zuerst), dann Kalorien-Distanz
        const sorted = [...pool].sort((a,b)=>{
          const usedA = usedCounts.get(a.id) || 0;
          const usedB = usedCounts.get(b.id) || 0;
          if(usedA !== usedB) return usedA - usedB;
          return Math.abs(a.kcal - target) - Math.abs(b.kcal - target);
        });
        // Unter den am wenigsten benutzten Rezepten: die 3 kalorien-nächsten nehmen und leicht zufällig wählen (Abwechslung)
        const leastUsed = usedCounts.get(sorted[0].id) || 0;
        const candidates = sorted.filter(r => (usedCounts.get(r.id)||0) === leastUsed)
          .sort((a,b)=>Math.abs(a.kcal-target)-Math.abs(b.kcal-target))
          .slice(0, 3);
        const chosen = candidates[Math.floor(Math.random()*candidates.length)];
        usedCounts.set(chosen.id, (usedCounts.get(chosen.id)||0) + 1);
        return chosen;
      }

      const fruehstueckPool = allRecipes.filter(r => (r.tags||[]).includes('Frühstück'));
      const snackPool = allRecipes.filter(r => (r.tags||[]).includes('Snack'));
      const hauptPool = allRecipes.filter(r => (r.tags||[]).includes('Hauptgericht'));
      const fallback = allRecipes;

      // Kalorienziel aufteilen: 25% Frühstück, 35% Mittag, 30% Abend, 10% Snack
      const kcalFrueh = Math.round(targetKcal * 0.25);
      const kcalMittag = Math.round(targetKcal * 0.35);
      const kcalAbend = Math.round(targetKcal * 0.30);

      // Meal-Prep-Prinzip: nur 3 Hauptgerichte für die GANZE Woche fix wählen,
      // die sich bei Mittag/Abend abwechseln. Kein tägliches Neukochen mehr.
      const MAIN_DISH_COUNT = 3;
      const avgHauptTarget = Math.round((kcalMittag + kcalAbend) / 2);
      const hauptSourcePool = hauptPool.length ? hauptPool : fallback;
      const mainDishes = [...hauptSourcePool]
        .sort((a,b)=>Math.abs(a.kcal-avgHauptTarget) - Math.abs(b.kcal-avgHauptTarget))
        .slice(0, Math.min(MAIN_DISH_COUNT, hauptSourcePool.length));
      let mainSlotCounter = 0;

      const usedFrueh = new Map();
      const usedSnack = new Map();

      const rows = [];
      weekDates.forEach((date) => {
        let tagesKcal = 0;

        const frueh = pickClosest(fruehstueckPool.length ? fruehstueckPool : fallback, kcalFrueh, usedFrueh);
        if(frueh){ rows.push({ user_id: state.user.id, recipe_id: frueh.id, log_date: date, servings_logged: frueh.servings || 1 }); tagesKcal += frueh.kcal; }

        if(mainDishes.length > 0){
          const mittag = mainDishes[mainSlotCounter % mainDishes.length]; mainSlotCounter++;
          rows.push({ user_id: state.user.id, recipe_id: mittag.id, log_date: date, servings_logged: mittag.servings || 1 }); tagesKcal += mittag.kcal;

          const abend = mainDishes[mainSlotCounter % mainDishes.length]; mainSlotCounter++;
          rows.push({ user_id: state.user.id, recipe_id: abend.id, log_date: date, servings_logged: abend.servings || 1 }); tagesKcal += abend.kcal;
        }

        // Snack ergänzen, um die Lücke zum Tagesziel zu schließen
        const restKcal = targetKcal - tagesKcal;
        if(restKcal >= 50 && snackPool.length > 0){
          const snack = pickClosest(snackPool, restKcal, usedSnack);
          if(snack) rows.push({ user_id: state.user.id, recipe_id: snack.id, log_date: date, servings_logged: snack.servings || 1 });
        }
      });

      if(rows.length === 0){ alert("Keine passenden Rezepte gefunden."); return; }
      const { error } = await sb.from("daily_log").insert(rows);
      if(error){ alert("Fehler: " + error.message); return; }
      await loadWeekLog();
    });
  });
}

function bindRecipePickerEvents(){
  document.getElementById("picker-overlay").addEventListener("click", (e)=>{ if(e.target.id==="picker-overlay"){ state.pickerOpen=null; render(); } });
  document.getElementById("picker-close").addEventListener("click", ()=>{ state.pickerOpen=null; render(); });
  document.getElementById("picker-search").addEventListener("input", (e)=>{
    state.pickerSearch = e.target.value; render();
    const el = document.getElementById("picker-search"); el.focus(); el.selectionStart = el.value.length;
  });
  document.querySelectorAll(".picker-item").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const recipeId = btn.dataset.recipeId;
      const { dayPlanId, slot } = state.pickerOpen;
      const recipe = state.recipes.find(r => r.id === recipeId);
      const existing = state.dayPlanItems.find(i => i.day_plan_id === dayPlanId && i.slot === slot);
      try{
        if(existing){
          const { error } = await sb.from("day_plan_items").update({ recipe_id: recipeId, servings: recipe.servings || 1 }).eq("id", existing.id);
          if(error) throw error;
        } else {
          const { error } = await sb.from("day_plan_items").insert({ day_plan_id: dayPlanId, recipe_id: recipeId, slot, servings: recipe.servings || 1 });
          if(error) throw error;
        }
        state.pickerOpen = null; await loadDayPlans();
      }catch(err){ alert("Fehler: " + err.message); }
    });
  });
}

function bindSwapEvents(){
  const overlay = document.getElementById("swap-overlay");
  if(!overlay) return;
  overlay.addEventListener("click", (e)=>{ if(e.target.id==="swap-overlay"){ state.swapTarget=null; render(); } });
  document.getElementById("swap-close").addEventListener("click", ()=>{ state.swapTarget=null; render(); });
  document.querySelectorAll("[data-swap-recipe-id]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const newRecipeId = btn.dataset.swapRecipeId;
      const { logId } = state.swapTarget;
      const newRecipe = state.recipes.find(r => r.id === newRecipeId);
      try{
        const { error } = await sb.from("daily_log").update({ recipe_id: newRecipeId, servings_logged: newRecipe.servings || 1 }).eq("id", logId);
        if(error) throw error;
        state.swapTarget = null;
        await loadWeekLog();
      }catch(err){ alert("Fehler: " + err.message); }
    });
  });
}

function bindPlanPopupEvents(){
  document.getElementById("plan-overlay").addEventListener("click", (e)=>{ if(e.target.id==="plan-overlay"){ state.planRecipeId=null; render(); } });
  document.getElementById("plan-close").addEventListener("click", ()=>{ state.planRecipeId=null; render(); });
  document.querySelectorAll(".day-pick").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const date = btn.dataset.date;
      if(state.planSelectedDays.includes(date)){ state.planSelectedDays = state.planSelectedDays.filter(d=>d!==date); }
      else { state.planSelectedDays.push(date); }
      render();
    });
  });
  document.getElementById("plan-confirm").addEventListener("click", async ()=>{
    if(state.planSelectedDays.length === 0){ alert("Bitte w\u00e4hle mindestens einen Tag aus."); return; }
    const recipe = state.recipes.find(r => r.id === state.planRecipeId);
    const confirmBtn = document.getElementById("plan-confirm");
    confirmBtn.disabled = true; confirmBtn.textContent = "Wird hinzugef\u00fcgt \u2026";
    const rows = state.planSelectedDays.map(date => ({ user_id: state.user.id, recipe_id: state.planRecipeId, log_date: date, servings_logged: recipe.servings || 1 }));
    const { error } = await sb.from("daily_log").insert(rows);
    if(error){ alert("Fehler: " + error.message); confirmBtn.disabled=false; confirmBtn.textContent="Hinzuf\u00fcgen"; return; }
    state.planRecipeId = null; await loadWeekLog();
  });
}

function bindModalEvents(){
  document.getElementById("modal-overlay").addEventListener("click", (e)=>{ if(e.target.id==="modal-overlay") closeModal(); });
  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("photo-drop").addEventListener("click", ()=>{ document.getElementById("photo-input").click(); });
  document.getElementById("photo-input").addEventListener("change", async (e)=>{
    const file = e.target.files[0]; if(!file) return;
    // Vorschau sofort anzeigen (lokal, ohne DB)
    const previewUrl = URL.createObjectURL(file);
    state.photoDataUrl = previewUrl;
    state.photoFile = file;
    render();
  });
  document.querySelectorAll("#tag-select-row .tag-pick").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const tag = chip.dataset.tag;
      if(state.selectedTags.includes(tag)){ state.selectedTags = state.selectedTags.filter(t=>t!==tag); }
      else { state.selectedTags.push(tag); }
      render();
    });
  });

  function syncIngredientRowsFromDOM(){
    const rowEls = document.querySelectorAll("#ingredient-rows .ingredient-row");
    state.ingredientRows = Array.from(rowEls).map(rowEl => ({
      amount: rowEl.querySelector(".ing-amount").value,
      unit: rowEl.querySelector(".ing-unit").value,
      name: rowEl.querySelector(".ing-name").value
    }));
  }

  document.getElementById("add-ingredient-row").addEventListener("click", ()=>{
    syncIngredientRowsFromDOM(); state.ingredientRows.push({amount:"", unit:"g", name:""}); render();
  });
  document.querySelectorAll(".ing-remove").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      syncIngredientRowsFromDOM();
      state.ingredientRows.splice(parseInt(btn.dataset.idx, 10), 1);
      if(state.ingredientRows.length === 0) state.ingredientRows.push({amount:"", unit:"g", name:""});
      render();
    });
  });
  document.querySelectorAll("#ingredient-rows input, #ingredient-rows select").forEach(el=>{
    el.addEventListener("input", syncIngredientRowsFromDOM);
    el.addEventListener("change", syncIngredientRowsFromDOM);
  });

  document.getElementById("recipe-form").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const submitBtn = e.target.querySelector("button[type=submit]");
    submitBtn.disabled = true; submitBtn.textContent = "Speichert \u2026";
    syncIngredientRowsFromDOM();

    // ── Foto zu Supabase Storage hochladen (statt Base64 in DB) ──
    state.uploadedPhotoUrl = null;
    if(state.photoFile){
      try{
        const fileExt = state.photoFile.name.split(".").pop().toLowerCase();
        const fileName = `recipe-${Date.now()}-${Math.random().toString(36).slice(2)}.${fileExt}`;
        const { data: uploadData, error: uploadError } = await sb.storage
          .from("recipe-photos")
          .upload(fileName, state.photoFile, { contentType: state.photoFile.type, upsert: false });
        if(uploadError) throw uploadError;
        const { data: urlData } = sb.storage.from("recipe-photos").getPublicUrl(fileName);
        state.uploadedPhotoUrl = urlData.publicUrl;
      }catch(uploadErr){
        alert("Foto-Upload fehlgeschlagen: " + uploadErr.message);
        submitBtn.disabled = false; submitBtn.textContent = "Speichern"; return;
      }
    }

    const cleanRows = state.ingredientRows.filter(row => row.name && row.name.trim()).map(row => ({
      amount: row.amount !== "" ? parseFloat(row.amount) : null,
      unit: row.unit, name: row.name.trim()
    }));
    const ingredientsText = cleanRows.map(row => (row.amount !== null ? row.amount + row.unit + " " : "") + row.name).join("\n");
    const payload = {
      user_id: state.user.id,
      title: document.getElementById("r-title").value.trim(),
      servings: parseInt(document.getElementById("r-servings").value, 10) || 1,
      ingredients: ingredientsText,
      ingredients_structured: cleanRows,
      steps: document.getElementById("r-steps").value.trim(),
      tags: state.selectedTags,
      kcal: document.getElementById("r-kcal").value !== "" ? parseFloat(document.getElementById("r-kcal").value) : null,
      protein: document.getElementById("r-protein").value !== "" ? parseFloat(document.getElementById("r-protein").value) : null,
      carbs: document.getElementById("r-carbs").value !== "" ? parseFloat(document.getElementById("r-carbs").value) : null,
      fat: document.getElementById("r-fat").value !== "" ? parseFloat(document.getElementById("r-fat").value) : null,
      photo_url: state.uploadedPhotoUrl || (state.editingRecipe ? state.editingRecipe.photo_url : null)
    };
    try{
      if(state.editingRecipe){
        const { error } = await sb.from("recipes").update(payload).eq("id", state.editingRecipe.id);
        if(error) throw error;
      } else {
        const { error } = await sb.from("recipes").insert(payload);
        if(error) throw error;
      }
      await loadRecipes(); closeModal();
    }catch(err){ alert("Fehler beim Speichern: " + err.message); submitBtn.disabled=false; submitBtn.textContent="Speichern"; }
  });

  const delBtn = document.getElementById("delete-recipe");
  if(delBtn){
    delBtn.addEventListener("click", async ()=>{
      if(!confirm("Dieses Rezept wirklich l\u00f6schen?")) return;
      const { error } = await sb.from("recipes").delete().eq("id", state.editingRecipe.id);
      if(error){ alert("Fehler: " + error.message); return; }
      await loadRecipes(); closeModal();
    });
  }
}

function bindDetailEvents(){
  document.getElementById("detail-overlay").addEventListener("click", (e)=>{ if(e.target.id==="detail-overlay"){ state.detailRecipe=null; render(); } });
  document.getElementById("detail-close").addEventListener("click", ()=>{ state.detailRecipe=null; render(); });
  const minusBtn = document.getElementById("servings-minus");
  const plusBtn = document.getElementById("servings-plus");
  if(minusBtn) minusBtn.addEventListener("click", ()=>{ if(state.detailServings > 1){ state.detailServings -= 1; render(); } });
  if(plusBtn) plusBtn.addEventListener("click", ()=>{ state.detailServings += 1; render(); });
  const editBtn = document.getElementById("edit-from-detail");
  if(editBtn){
    editBtn.addEventListener("click", ()=>{
      state.editingRecipe = state.detailRecipe;
      state.selectedTags = [...(state.detailRecipe.tags||[])];
      state.photoDataUrl = state.detailRecipe.photo_url || null;
      state.ingredientRows = (state.detailRecipe.ingredients_structured && state.detailRecipe.ingredients_structured.length)
        ? state.detailRecipe.ingredients_structured.map(row => ({ amount: row.amount !== null && row.amount !== undefined ? row.amount : "", unit: row.unit || "g", name: row.name || "" }))
        : [{amount:"", unit:"g", name:""}];
      state.detailRecipe = null; state.modalOpen = true; render();
    });
  }
}

function closeModal(){
  state.modalOpen = false; state.editingRecipe = null; state.photoDataUrl = null; state.photoFile = null; state.uploadedPhotoUrl = null;
  state.selectedTags = []; state.ingredientRows = [{amount:"", unit:"g", name:""}]; render();
}

/* ---------- DATA ---------- */
async function loadRecipes(){
  // ── Nur Listenfelder laden, KEIN ingredients/steps/ingredients_structured ──
  const { data, error } = await sb.from("recipes")
    .select(LIST_COLUMNS)
    .order("created_at", { ascending: false });
  if(error){ console.error(error); return; }
  state.recipes = data || [];
  render();
}

async function loadWeekLog(){
  const weekDates = getCurrentWeekDates();
  const { data, error } = await sb.from("daily_log")
    .select("*")
    .gte("log_date", weekDates[0])
    .lte("log_date", weekDates[6])
    .order("created_at", { ascending: true });
  if(error){ console.error(error); return; }
  state.weekLog = data || [];

  // Vollständige Zutaten (ingredients_structured) für alle Rezepte in der Woche nachladen,
  // da state.recipes (Listenansicht) diese aus Performance-Gründen nicht enthält.
  const recipeIds = [...new Set(state.weekLog.map(e => e.recipe_id))];
  if(recipeIds.length > 0){
    const { data: detailData, error: detailError } = await sb.from("recipes")
      .select("id,servings,ingredients_structured")
      .in("id", recipeIds);
    if(!detailError && detailData){
      const map = {};
      detailData.forEach(r => { map[r.id] = r; });
      state.weekRecipeDetails = map;
    }
  }
  render();
}

async function loadDayPlans(){
  const { data: plans, error: plansError } = await sb.from("day_plans").select("*").order("created_at", { ascending: true });
  if(plansError){ console.error(plansError); return; }
  state.dayPlans = plans || [];
  const { data: items, error: itemsError } = await sb.from("day_plan_items").select("*");
  if(itemsError){ console.error(itemsError); return; }
  state.dayPlanItems = items || [];
  render();
}

async function loadShoppingChecks(){
  const weekStart = getCurrentWeekDates()[0];
  const { data, error } = await sb.from("shopping_checked").select("*").eq("week_start", weekStart);
  if(error){ console.error(error); return; }
  const map = {};
  (data || []).forEach(row => { map[row.item_key] = row.checked; });
  state.shoppingChecks = map;
  render();
}

async function checkSession(){
  try{
    const { data, error } = await sb.auth.getSession();
    if(data && data.session){
      state.user = data.session.user;
      state.view = "app";
      await loadRecipes();
    debugUserId();
    } else if(error){
      state.view = "login";
      state.serviceDown = true;
      state.error = "";
      render();
    } else {
      state.view = "login";
      state.serviceDown = false;
      state.error = "";
      render();
    }
  }catch(err){
    state.view = "login";
    state.serviceDown = true;
    state.error = "";
    render();
  }
}

/* ---------- HELPERS ---------- */
function escapeHtml(str){
  if(!str) return "";
  return str.replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

/* ---------- INIT ---------- */
sb.auth.onAuthStateChange((_event, session)=>{
  if(session && state.view !== "app"){
    state.user = session.user; state.view = "app"; loadRecipes();
  }
});

checkSession();
render();
</script>
