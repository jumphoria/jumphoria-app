<style>
  /* ====== TOKENS (Jumphoria Gold) ====== */
  :root{
    --cream:#7C9070;       /* sattes Salbei-/Olivgruen wie auf der Homepage */
    --paper:#EFE7D8;       /* warmer Creme-Ton fuer Karten/Flaechen */
    --ink:#F7F3E8;         /* helle, warme Schrift fuer den gruenen Hintergrund */
    --ink-on-paper:#3A4A30; /* dunkles Waldgruen fuer Text auf Creme-Karten */
    --ink-soft:#E8E4D0;    /* gedaempfte helle Schrift auf gruenem Hintergrund */
    --pine:#C99A3B;        /* kraeftiges Gold als Hauptakzent */
    --pine-dark:#A87E2A;   /* dunkleres Gold fuer Hover */
    --terracotta:#D97B5E;  /* warmer Korallton als zweiter Akzent */
    --terracotta-soft:#F3DCD2; /* heller Korall-Hintergrund fuer Tags */
    --line:#D8CFB8;        /* warme, helle Trennlinien */
    --shadow: 0 6px 18px rgba(58,74,48,0.18), 0 1px 3px rgba(58,74,48,0.12);
  }

  *{box-sizing:border-box;}
  html{ overflow-x:hidden; width:100%; }
  img, .card-photo, .detail-photo, .auth-logo, .brand-logo{ max-width:100%; }
  body{
    margin:0;
    overflow-x:hidden;
    width:100%;
    background:var(--cream);
    color:var(--ink);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3, .recipe-title{
    font-family: Georgia, 'Times New Roman', serif;
    letter-spacing:-0.01em;
  }

  .app{
    max-width:1000px !important; width:100% !important; margin:0 auto !important;
    padding:24px 18px 80px !important; box-sizing:border-box !important;
    position:relative !important; left:0 !important; right:0 !important;
  }

  /* ====== HEADER ====== */
  .top{
    display:flex !important; align-items:center !important; justify-content:space-between !important;
    margin-bottom:28px !important; flex-wrap:wrap !important; gap:12px !important; width:100% !important;
  }
  .brand{ display:flex !important; align-items:center !important; gap:10px !important; }
  .brand-logo{ height:44px !important; width:auto !important; max-width:200px !important; display:block !important; }
  .auth-logo{ height:64px !important; width:auto !important; max-width:280px !important; display:block !important; margin:0 auto 18px !important; }
  .user-pill{
    display:flex; align-items:center; gap:10px;
    font-size:13px; color:var(--ink-soft);
  }
  .btn-ghost{
    background:none; border:1px solid var(--line); color:var(--ink-soft);
    padding:7px 14px; border-radius:20px; cursor:pointer; font-size:13px;
  }
  .btn-ghost:hover{ border-color:var(--terracotta); color:var(--terracotta); }

  /* ====== BUTTONS ====== */
  .btn{
    background:var(--pine); color:#fff; border:none;
    padding:11px 20px; border-radius:10px; font-size:14px;
    cursor:pointer; font-weight:600; transition:transform .08s ease, background .15s;
  }
  .btn:hover{ background:var(--pine-dark); }
  .btn:active{ transform:scale(0.98); }
  .btn-outline{
    background:transparent; color:var(--pine); border:1.5px solid var(--pine);
    padding:9px 18px; border-radius:10px; font-size:14px; cursor:pointer; font-weight:600;
  }
  .btn-outline:hover{ background:var(--pine); color:#fff; }
  .btn-danger{ color:var(--terracotta); background:none; border:none; cursor:pointer; font-size:13px; }
  .btn-block{ width:100%; }

  /* ====== AUTH CARD ====== */
  .auth-wrap{ display:flex; justify-content:center; padding-top:40px; }
  .auth-card{
    background:var(--paper); border-radius:18px; padding:36px 32px;
    box-shadow:var(--shadow); max-width:380px; width:100%;

  .auth-sub{ color:var(--ink-on-paper); opacity:0.75; font-size:14px; margin:0 0 24px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; color:var(--ink-on-paper); opacity:0.75; margin-bottom:6px; font-weight:600; }
  .field input, .field select, .field textarea{

  .auth-toggle a{ color:var(--pine-dark); font-weight:600; cursor:pointer; text-decoration:none; }
  .auth-error{

  /* ====== TOOLBAR ====== */

  .today-add-btn{

    font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .day-pick.active{ background:var(--pine); border-color:var(--pine); color:#fff; }

  /* ====== SHOPPING LIST ====== */
  .shopping-list{ display:flex; flex-direction:column; gap:8px; width:100%; }
  .shopping-item{
    display:flex; align-items:center; gap:12px; background:var(--paper);
    border-radius:12px; padding:13px 16px; cursor:pointer; border:1px solid var(--line);
    width:100%;
  }
  .shopping-item input{ display:none; }
  .shopping-check-icon{
    width:22px; height:22px; border-radius:50%; border:2px solid var(--pine);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-size:13px; color:#fff; font-weight:700;
  }
  .shopping-item.is-checked .shopping-check-icon{ background:var(--pine); }
  .shopping-text{
    color:var(--ink-on-paper); font-size:14.5px;

  .photo-drop{
    border:2px dashed var(--line); border-radius:12px; padding:18px;

    margin-bottom:14px; position:relative; overflow:hidden;

  .photo-drop img{ max-width:100%; max-height:160px; border-radius:8px; display:block; margin:0 auto; }
  .photo-drop input{ display:none; }
  .tag-select-row{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .ingredient-row{ display:flex; gap:6px; margin-bottom:8px; align-items:center; }
  .macro-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .macro-field{ display:flex; flex-direction:column; gap:4px; flex:1; min-width:70px; }
  .macro-field span{ font-size:11px; color:var(--ink-on-paper); opacity:0.65; font-weight:600; }
  .macro-field input{
    padding:8px 9px; border-radius:8px; border:1.5px solid var(--line);
    background:#fff; color:var(--ink-on-paper); font-size:13.5px; font-family:inherit; width:100%;
  }
  .ingredient-row input, .ingredient-row select{
    padding:9px 10px; border-radius:8px; border:1.5px solid var(--line);

  .ing-remove{
    background:none; border:none; color:var(--ink-on-paper); opacity:0.6; cursor:pointer; font-size:15px;

  .tag-pick{
    padding:6px 13px; border-radius:20px; font-size:12.5px; cursor:pointer;

  .tag-pick.active{ background:var(--pine); border-color:var(--pine); color:#fff; }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }

  /* ====== DETAIL VIEW ====== */
  .detail-photo{ width:100%; max-height:280px; object-fit:cover; border-radius:14px; margin-bottom:18px; }
  .servings-stepper{
    display:flex; align-items:center; gap:12px; margin-bottom:18px;

  }
  .stepper-btn{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--pine);
    background:transparent; color:var(--pine-dark); font-size:17px; font-weight:700;
    cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:0; padding:0;

  .stepper-btn:hover{ background:var(--pine); color:#fff; }

  }
  .macro-pill strong{ color:var(--ink); font-size:15px; line-height:1.2; }
  .macro-pill span{ color:var(--ink); opacity:0.75; font-size:10.5px; text-transform:uppercase; letter-spacing:.02em; }
  .detail-section{ margin-bottom:18px; }
  .detail-section h4{
    font-size:12.5px; text-transform:uppercase; letter-spacing:.05em;

  .detail-section p, .detail-section li{ font-size:14.5px; line-height:1.6; color:var(--ink-on-paper); }

  .loading{ text-align:center; padding:60px; color:var(--ink-soft); }
  @media (max-width:480px){

function getCurrentWeekDates(){
  const today = new Date();
  const dayOfWeek = today.getDay();
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  const dates = [];
  for(let i = 0; i < 7; i++){
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

let state = {
  user: null,
  view: "loading",       // loading | login | register | app
  recipes: [],
  search: "",
  activeTag: null,
  modalOpen: false,
  editingRecipe: null,
  detailRecipe: null,
  photoDataUrl: null,

  ingredientRows: [{amount:"", unit:"g", name:""}],

  planRecipeId: null,
  planSelectedDays: [],
  error: ""
};

function render(){
  const el = document.getElementById("app");
  if(state.view === "loading"){
    el.innerHTML = `<div class="loading">L\u00e4dt \u2026</div>`;
    return;
  }
  if(state.view === "login" || state.view === "register"){
    el.innerHTML = renderAuth();
    bindAuthEvents();
    return;
  }
  el.innerHTML = renderAppShell();
  bindAppEvents();
}

/* ---------- AUTH VIEW ---------- */
function renderAuth(){
  const isLogin = state.view === "login";
  return `
    <div class="auth-wrap">
      <div class="auth-card">
        <img class="auth-logo" src="${LOGO_BASE64}" alt="Jumphoria">
        <h2>${isLogin ? "Willkommen zur\u00fcck" : "Konto erstellen"}</h2>
        <p class="auth-sub">${isLogin ? "Melde dich an, um deine Rezepte zu sehen." : "Lege dein kostenloses Jumphoria-Konto an."}</p>
        ${state.error ? `<div class="auth-error">${state.error}</div>` : ""}
        <form id="auth-form">
          <div class="field">
            <label>E-Mail</label>
            <input type="email" id="auth-email" required placeholder="du@beispiel.de">
          </div>
          <div class="field">
            <label>Passwort</label>
            <input type="password" id="auth-password" required placeholder="Mindestens 6 Zeichen" minlength="6">
          </div>
          <button type="submit" class="btn btn-block">${isLogin ? "Anmelden" : "Registrieren"}</button>
        </form>
        <div class="auth-toggle">
          ${isLogin
            ? `Noch kein Konto? <a id="to-register">Jetzt registrieren</a>`
            : `Schon registriert? <a id="to-login">Zum Login</a>`}
        </div>
      </div>
    </div>
  `;
}

function bindAuthEvents(){
  document.getElementById("auth-form").addEventListener("submit", async (e)=>{
    e.preventDefault();
    state.error = "";
    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    const submitBtn = e.target.querySelector("button");
    submitBtn.disabled = true; submitBtn.textContent = "Einen Moment \u2026";

    try{
      if(state.view === "login"){
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if(error) throw error;
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if(error) throw error;
        state.error = "";
        alert("Konto erstellt! Falls eine Best\u00e4tigungsmail n\u00f6tig ist, pr\u00fcfe dein Postfach. Du kannst dich jetzt anmelden.");
        state.view = "login";
        render();
        return;
      }
      await checkSession();
    }catch(err){
      state.error = translateError(err.message);
      render();
    }
  });

  const toReg = document.getElementById("to-register");
  if(toReg) toReg.addEventListener("click", ()=>{ state.view="register"; state.error=""; render(); });
  const toLogin = document.getElementById("to-login");
  if(toLogin) toLogin.addEventListener("click", ()=>{ state.view="login"; state.error=""; render(); });
}

function translateError(msg){
  if(!msg) return "Etwas ist schiefgelaufen. Versuch es erneut.";
  if(msg.includes("Invalid login credentials")) return "E-Mail oder Passwort ist falsch.";
  if(msg.includes("already registered")) return "Diese E-Mail ist schon registriert.";
  if(msg.includes("Password")) return "Das Passwort muss mindestens 6 Zeichen haben.";
  return msg;
}

      </div>
    </div>

    <div class="main-tabs">
      <button class="main-tab ${state.mainTab==='recipes'?'active':''}" data-tab="recipes">Rezepte</button>
      <button class="main-tab ${state.mainTab==='today'?'active':''}" data-tab="today">Woche</button>
      <button class="main-tab ${state.mainTab==='shopping'?'active':''}" data-tab="shopping">Einkauf</button>
      <button class="main-tab ${state.mainTab==='shopping'?'active':''}" data-tab="shopping">Einkauf</button>
    </div>

    ${state.mainTab === 'today' ? renderWeek() : state.mainTab === 'shopping' ? renderShoppingList() : renderRecipesTab()}

    <button class="fab" id="add-fab" title="Neues Rezept">+</button>

    ${state.modalOpen ? renderModal() : ""}
    ${state.planRecipeId ? renderPlanPopup() : ""}
    ${state.detailRecipe ? renderDetail() : ""}
  `;
}

function renderRecipesTab(){
  return `
    <div class="toolbar">
      <input class="search-input" id="search-input" placeholder="Rezept suchen \u2026" value="${escapeAttr(state.search)}">
    </div>
    <div class="tag-filters" id="tag-filters">
      ${ALL_TAGS.map(t => `<span class="tag-chip ${state.activeTag===t?'active':''}" data-tag="${t}">${t}</span>`).join("")}
      ${state.activeTag ? `<span class="tag-chip" id="clear-tag-filter">\u2715 Filter</span>` : ""}
    </div>
    ${renderGrid()}
  `;
}

function renderWeek(){
  const entries = state.weekLog || [];
  const weekDates = getCurrentWeekDates();

  if(entries.length === 0){
    return `
      <div class="empty-state">
        <h3>Noch nichts f\u00fcr diese Woche geplant</h3>
        <p>Geh zu "Rezepte" und tippe bei einem Rezept auf "+ Geplant", um Tage auszuw\u00e4hlen.</p>
      </div>
    `;
  }

  return `
    <div class="week-list">
      ${weekDates.map((date, idx) => {
        const dayEntries = entries.filter(e => e.log_date === date);
        let kcalSum = 0, proteinSum = 0, carbsSum = 0, fatSum = 0;
        dayEntries.forEach(e => {
          const recipe = state.recipes.find(r => r.id === e.recipe_id);
          if(!recipe) return;
          const factor = e.servings_logged / (recipe.servings || 1);
          if(recipe.kcal != null) kcalSum += recipe.kcal * factor;
          if(recipe.protein != null) proteinSum += recipe.protein * factor;
          if(recipe.carbs != null) carbsSum += recipe.carbs * factor;
          if(recipe.fat != null) fatSum += recipe.fat * factor;
        });
        const dateObj = new Date(date + "T00:00:00");
        const dayLabel = WEEKDAY_NAMES[idx] + ", " + dateObj.getDate() + "." + (dateObj.getMonth()+1) + ".";
        const isToday = date === new Date().toISOString().slice(0,10);

        return `
          <div class="week-day ${isToday ? 'is-today' : ''}">
            <div class="week-day-header">
              <h4>${dayLabel}${isToday ? ' \u2022 heute' : ''}</h4>
              ${dayEntries.length > 0 ? `<span class="week-day-kcal">${Math.round(kcalSum)} kcal</span>` : ""}
            </div>
            ${dayEntries.length === 0 ? `<p class="week-day-empty">Nichts geplant</p>` : `
              <div class="today-list">
                ${dayEntries.map(e => {
                  const recipe = state.recipes.find(r => r.id === e.recipe_id);
                  if(!recipe) return "";
                  const factor = e.servings_logged / (recipe.servings || 1);
                  const kcalForEntry = recipe.kcal != null ? Math.round(recipe.kcal * factor) : null;
                  return `
                    <div class="today-entry">
                      <div class="today-entry-info">
                        <strong>${escapeHtml(recipe.title)}</strong>
                        <span>${e.servings_logged} Portion${e.servings_logged==1?'':'en'}${kcalForEntry!==null?` \u00b7 ${kcalForEntry} kcal`:''}</span>
                      </div>
                      <button type="button" class="today-remove" data-log-id="${e.id}">\u2715</button>
                    </div>
                  `;
                }).join("")}
              </div>
            `}
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function buildShoppingItems(){
  const entries = state.weekLog || [];
  const itemMap = {};

  entries.forEach(e => {
    const recipe = state.recipes.find(r => r.id === e.recipe_id);
    if(!recipe || !recipe.ingredients_structured) return;
    const factor = e.servings_logged / (recipe.servings || 1);
    recipe.ingredients_structured.forEach(ing => {
      if(!ing.name) return;
      const unit = ing.amount !== null && ing.amount !== undefined ? (ing.unit || "") : "";
      const key = (unit + "_" + ing.name).toLowerCase().replace(/[^a-z0-9_]/g, "");
      if(!itemMap[key]){
        itemMap[key] = { key, name: ing.name, unit: unit, amount: 0, hasAmount: ing.amount !== null && ing.amount !== undefined };
      }
      if(ing.amount !== null && ing.amount !== undefined){
        itemMap[key].amount += ing.amount * factor;
      }
    });
  });

  return Object.values(itemMap).sort((a,b) => a.name.localeCompare(b.name));
}

function renderShoppingList(){
  const items = buildShoppingItems();
  if(items.length === 0){
    return `
      <div class="empty-state">
        <h3>Einkaufsliste ist leer</h3>
        <p>Plane Rezepte im "Woche"-Tab ein, dann erscheinen hier automatisch die ben\u00f6tigten Zutaten.</p>
      </div>
    `;
  }
  return `
    <div class="shopping-list">
      ${items.map(item => {
        const checked = state.shoppingChecks && state.shoppingChecks[item.key];
        const displayAmount = item.hasAmount
          ? (item.amount % 1 === 0 ? item.amount.toFixed(0) : item.amount.toFixed(1)) + item.unit + " "
          : "";
        return `
          <label class="shopping-item ${checked ? 'is-checked' : ''}">
            <input type="checkbox" class="shopping-checkbox" data-key="${escapeAttr(item.key)}" ${checked ? 'checked' : ''}>
            <span class="shopping-check-icon">${checked ? '\u2713' : ''}</span>
            <span class="shopping-text">${displayAmount}${escapeHtml(item.name)}</span>
          </label>
        `;
      }).join("")}
    </div>
  `;
}

function renderPlanPopup(){
  const recipe = state.recipes.find(r => r.id === state.planRecipeId);
  if(!recipe) return "";
  const weekDates = getCurrentWeekDates();
  return `
    <div class="overlay" id="plan-overlay">
      <div class="modal plan-modal">
        <button class="modal-close" id="plan-close">\u2715</button>
        <h2>${escapeHtml(recipe.title)}</h2>
        <p style="color:var(--ink-on-paper); opacity:0.75; font-size:14px; margin:0 0 16px;">F\u00fcr welche Tage einplanen?</p>
        <div class="day-pick-row">
          ${WEEKDAY_NAMES.map((name, idx) => `
            <button type="button" class="day-pick ${state.planSelectedDays.includes(weekDates[idx])?'active':''}" data-date="${weekDates[idx]}">${name}</button>
          `).join("")}
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" id="plan-confirm">Hinzuf\u00fcgen</button>
        </div>
      </div>
    </div>
  `;
}

function renderGrid(){
  const filtered = state.recipes.filter(r=>{
    const matchesSearch = !state.search || r.title.toLowerCase().includes(state.search.toLowerCase());
    const matchesTag = !state.activeTag || (r.tags||[]).includes(state.activeTag);
    return matchesSearch && matchesTag;
  });

  if(filtered.length === 0){
    return `
      <div class="empty-state">
        <h3>Noch keine Rezepte hier</h3>
        <p>Tippe auf das + unten rechts, um dein erstes Rezept anzulegen.</p>
      </div>
    `;
  }

  return `
    <div class="grid">
      ${filtered.map(r => {
        const kcalPerServing = (r.kcal != null && r.servings) ? Math.round(r.kcal / r.servings) : null;
        return `
        <div class="card" data-id="${r.id}">
          <div class="card-hole"></div>
          ${r.photo_url
            ? `<img class="card-photo" src="${r.photo_url}" alt="${escapeAttr(r.title)}">`
            : `<div class="card-photo empty">\u{1F372}</div>`}
          ${kcalPerServing !== null ? `<div class="kcal-badge">${kcalPerServing} kcal</div>` : ""}
          <div class="card-body">
            <h3 class="recipe-title">${escapeHtml(r.title)}</h3>
            <div class="card-tags">
              ${(r.tags||[]).slice(0,3).map(t=>`<span class="tag-badge">${t}</span>`).join("")}
            </div>
            <button type="button" class="today-add-btn" data-recipe-id="${r.id}">+ Geplant</button>
          </div>
        </div>
      `;}).join("")}
    </div>
  `;
}

/* ---------- ADD/EDIT MODAL ---------- */

    <div class="overlay" id="modal-overlay">
      <div class="modal">
        <button class="modal-close" id="modal-close">\u2715</button>
        <h2>${state.editingRecipe ? "Rezept bearbeiten" : "Neues Rezept"}</h2>
        <form id="recipe-form">
          <div class="photo-drop" id="photo-drop">
            ${state.photoDataUrl
              ? `<img src="${state.photoDataUrl}" alt="Vorschau">`
              : `\u{1F4F7} Foto hinzuf\u00fcgen (optional)<br><small>Tippen zum Ausw\u00e4hlen</small>`}
            <input type="file" id="photo-input" accept="image/*">
          </div>
          <div class="field">
            <label>Titel</label>

            <label>N\u00e4hrwerte gesamt (f\u00fcr alle Portionen zusammen, optional)</label>
            <div class="macro-row">
              <div class="macro-field"><span>kcal</span><input type="number" id="r-kcal" min="0" step="any" value="${r.kcal!=null?r.kcal:''}"></div>
              <div class="macro-field"><span>Eiwei\u00df (g)</span><input type="number" id="r-protein" min="0" step="any" value="${r.protein!=null?r.protein:''}"></div>
              <div class="macro-field"><span>KH (g)</span><input type="number" id="r-carbs" min="0" step="any" value="${r.carbs!=null?r.carbs:''}"></div>
              <div class="macro-field"><span>Fett (g)</span><input type="number" id="r-fat" min="0" step="any" value="${r.fat!=null?r.fat:''}"></div>
            </div>
          </div>
          <div class="field">
            <label>Kategorien</label>
            <div class="tag-select-row" id="tag-select-row">
              ${ALL_TAGS.map(t => `<span class="tag-pick ${state.selectedTags.includes(t)?'active':''}" data-tag="${t}">${t}</span>`).join("")}

                <div class="ingredient-row" data-idx="${i}">
                  <input type="number" class="ing-amount" placeholder="Menge" value="${row.amount!==undefined?escapeAttr(String(row.amount)):''}" step="any" style="width:70px;">
                  <select class="ing-unit" style="width:80px;">
                    ${["g","kg","ml","l","stk","tl","el","prise"].map(u => `<option value="${u}" ${row.unit===u?'selected':''}>${u}</option>`).join("")}
                  </select>
                  <input type="text" class="ing-name" placeholder="Zutat, z.B. Rinderhack" value="${escapeAttr(row.name||'')}" style="flex:1;">
                  <button type="button" class="ing-remove" data-idx="${i}" title="Entfernen">\u2715</button>
                </div>
              `).join("")}
            </div>
            <button type="button" id="add-ingredient-row" class="btn-outline" style="margin-top:8px; font-size:13px; padding:6px 14px;">+ Zutat hinzuf\u00fcgen</button>
          </div>
          <div class="field">
            <label>Zubereitung</label>
            <textarea id="r-steps" rows="6" placeholder="Schritt f\u00fcr Schritt \u2026">${escapeHtml(r.steps||"")}</textarea>
          </div>
          <div class="modal-actions">
            <button type="submit" class="btn">Speichern</button>
            ${state.editingRecipe ? `<button type="button" class="btn-danger" id="delete-recipe">Rezept l\u00f6schen</button>` : ""}
          </div>
        </form>
      </div>
    </div>
  `;
}

/* ---------- DETAIL VIEW ---------- */
function renderDetail(){
  const r = state.detailRecipe;
  const baseServings = r.servings || 1;
  const currentServings = state.detailServings || baseServings;
  const scale = currentServings / baseServings;

  const hasStructured = r.ingredients_structured && r.ingredients_structured.length > 0;
  let ingredientsHtml;
  if(hasStructured){
    ingredientsHtml = r.ingredients_structured.map(ing => {
      if(ing.amount === null || ing.amount === undefined){
        return `<li>${escapeHtml(ing.name)}</li>`;
      }
      const scaledAmount = ing.amount * scale;
      const displayAmount = scaledAmount % 1 === 0 ? scaledAmount.toFixed(0) : scaledAmount.toFixed(1);
      return `<li>${displayAmount}${ing.unit} ${escapeHtml(ing.name)}</li>`;
    }).join("");
  } else {
    const ingredientsList = (r.ingredients||"").split("\n").filter(Boolean);
    ingredientsHtml = ingredientsList.map(i=>`<li>${escapeHtml(i)}</li>`).join("");
  }

  return `
    <div class="overlay" id="detail-overlay">
      <div class="modal">
        <button class="modal-close" id="detail-close">\u2715</button>
        ${r.photo_url ? `<img class="detail-photo" src="${r.photo_url}" alt="${escapeAttr(r.title)}">` : ""}
        <h2>${escapeHtml(r.title)}</h2>
        <div class="card-tags" style="margin-bottom:10px;">
          ${(r.tags||[]).map(t=>`<span class="tag-badge">${t}</span>`).join("")}
        </div>
        ${r.servings ? `
        <div class="servings-stepper">
          <span>Portionen:</span>
          <button type="button" id="servings-minus" class="stepper-btn">\u2212</button>
          <span class="servings-value">${currentServings}</span>
          <button type="button" id="servings-plus" class="stepper-btn">+</button>
        </div>` : ""}
        ${r.kcal != null ? `
        <div class="macro-summary">
          <div class="macro-pill"><strong>${Math.round(r.kcal*scale)}</strong><span>kcal</span></div>
          ${r.protein != null ? `<div class="macro-pill"><strong>${Math.round(r.protein*scale)}g</strong><span>Eiwei\u00df</span></div>` : ""}
          ${r.carbs != null ? `<div class="macro-pill"><strong>${Math.round(r.carbs*scale)}g</strong><span>KH</span></div>` : ""}
          ${r.fat != null ? `<div class="macro-pill"><strong>${Math.round(r.fat*scale)}g</strong><span>Fett</span></div>` : ""}
        </div>` : ""}
        <div class="detail-section">
          <h4>Zutaten</h4>
          <ul>${ingredientsHtml}</ul>
        </div>
        <div class="detail-section">
          <h4>Zubereitung</h4>
          <p class="ztext">${escapeHtml(r.steps||"")}</p>
        </div>
        <div class="modal-actions">
          <button class="btn-outline" id="edit-from-detail">Bearbeiten</button>
        </div>
      </div>
    </div>
  `;
}

/* ---------- EVENT BINDING ---------- */
function bindAppEvents(){
  document.getElementById("logout-btn").addEventListener("click", async ()=>{
    await sb.auth.signOut();
    state.user = null; state.recipes = []; state.view = "login";
    render();
  });

  document.querySelectorAll(".main-tab").forEach(tab=>{
    tab.addEventListener("click", ()=>{
      state.mainTab = tab.dataset.tab;
      if(state.mainTab === "today") loadWeekLog();
      if(state.mainTab === "shopping"){
        loadWeekLog();
        loadShoppingChecks();
      }
      render();
    });
  });

  const searchInput = document.getElementById("search-input");
  if(searchInput){
    searchInput.addEventListener("input", (e)=>{
      state.search = e.target.value;
      render();
      document.getElementById("search-input").focus();
      document.getElementById("search-input").selectionStart = document.getElementById("search-input").value.length;
    });
  }

  document.querySelectorAll("#tag-filters .tag-chip[data-tag]").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const tag = chip.dataset.tag;
      state.activeTag = state.activeTag === tag ? null : tag;
      render();
    });
  });
  const clearBtn = document.getElementById("clear-tag-filter");
  if(clearBtn) clearBtn.addEventListener("click", ()=>{ state.activeTag=null; render(); });

  document.getElementById("add-fab").addEventListener("click", ()=>{
    state.modalOpen = true; state.editingRecipe = null; state.photoDataUrl = null; state.selectedTags = [];
    state.ingredientRows = [{amount:"", unit:"g", name:""}];
    render();
  });

  document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", (e)=>{
      if(e.target.closest(".today-add-btn")) return;
      const recipe = state.recipes.find(r=>r.id === card.dataset.id);
      state.detailRecipe = recipe;
      state.detailServings = recipe.servings || 1;
      render();
    });
  });

  document.querySelectorAll(".today-add-btn").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      state.planRecipeId = btn.dataset.recipeId;
      state.planSelectedDays = [];
      render();
    });
  });

  document.querySelectorAll(".today-remove").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const logId = btn.dataset.logId;
      const { error } = await sb.from("daily_log").delete().eq("id", logId);
      if(error){ alert("Fehler: " + error.message); return; }
      await loadWeekLog();
    });
  });

  document.querySelectorAll(".shopping-checkbox").forEach(cb=>{
    cb.addEventListener("change", async ()=>{
      const key = cb.dataset.key;
      const newChecked = cb.checked;
      state.shoppingChecks[key] = newChecked;
      render();
      try{
        const weekStart = getCurrentWeekDates()[0];
        if(newChecked){
          const { error } = await sb.from("shopping_checked").upsert({
            user_id: state.user.id,
            item_key: key,
            week_start: weekStart,
            checked: true
          }, { onConflict: "user_id,item_key,week_start" });
          if(error) console.error(error);
        } else {
          const { error } = await sb.from("shopping_checked").delete()
            .eq("user_id", state.user.id).eq("item_key", key).eq("week_start", weekStart);
          if(error) console.error(error);
        }
      }catch(err){ console.error(err); }
    });
  });

  if(state.modalOpen) bindModalEvents();
  if(state.detailRecipe) bindDetailEvents();
  if(state.planRecipeId) bindPlanPopupEvents();
}

function bindPlanPopupEvents(){
  document.getElementById("plan-overlay").addEventListener("click", (e)=>{
    if(e.target.id === "plan-overlay"){ state.planRecipeId = null; render(); }
  });
  document.getElementById("plan-close").addEventListener("click", ()=>{
    state.planRecipeId = null; render();
  });
  document.querySelectorAll(".day-pick").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const date = btn.dataset.date;
      if(state.planSelectedDays.includes(date)){
        state.planSelectedDays = state.planSelectedDays.filter(d=>d!==date);
      } else {
        state.planSelectedDays.push(date);
      }
      render();
    });
  });
  document.getElementById("plan-confirm").addEventListener("click", async ()=>{
    if(state.planSelectedDays.length === 0){
      alert("Bitte w\u00e4hle mindestens einen Tag aus.");
      return;
    }
    const recipe = state.recipes.find(r => r.id === state.planRecipeId);
    const confirmBtn = document.getElementById("plan-confirm");
    confirmBtn.disabled = true; confirmBtn.textContent = "Wird hinzugef\u00fcgt \u2026";
    try{
      const rows = state.planSelectedDays.map(date => ({
        user_id: state.user.id,
        recipe_id: state.planRecipeId,
        log_date: date,
        servings_logged: recipe.servings || 1
      }));
      const { error } = await sb.from("daily_log").insert(rows);
      if(error) throw error;
      state.planRecipeId = null;
      await loadWeekLog();
    }catch(err){
      alert("Fehler: " + err.message);
      confirmBtn.disabled = false; confirmBtn.textContent = "Hinzuf\u00fcgen";
    }
  });
}

function bindModalEvents(){
  document.getElementById("modal-overlay").addEventListener("click", (e)=>{
    if(e.target.id === "modal-overlay") closeModal();
  });
  document.getElementById("modal-close").addEventListener("click", closeModal);

  document.getElementById("photo-drop").addEventListener("click", ()=>{
    document.getElementById("photo-input").click();
  });
  document.getElementById("photo-input").addEventListener("change", (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{ state.photoDataUrl = reader.result; render(); };
    reader.readAsDataURL(file);
  });

  document.querySelectorAll("#tag-select-row .tag-pick").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const tag = chip.dataset.tag;
      if(state.selectedTags.includes(tag)){
        state.selectedTags = state.selectedTags.filter(t=>t!==tag);
      } else {
        state.selectedTags.push(tag);
      }
      render();
    });
  });

  function syncIngredientRowsFromDOM(){
    const rowEls = document.querySelectorAll("#ingredient-rows .ingredient-row");
    state.ingredientRows = Array.from(rowEls).map(rowEl => ({
      amount: rowEl.querySelector(".ing-amount").value,
      unit: rowEl.querySelector(".ing-unit").value,
      name: rowEl.querySelector(".ing-name").value
    }));
  }

  document.getElementById("add-ingredient-row").addEventListener("click", ()=>{
    syncIngredientRowsFromDOM();
    state.ingredientRows.push({amount:"", unit:"g", name:""});
    render();
  });

  document.querySelectorAll(".ing-remove").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      syncIngredientRowsFromDOM();
      const idx = parseInt(btn.dataset.idx, 10);
      state.ingredientRows.splice(idx, 1);
      if(state.ingredientRows.length === 0) state.ingredientRows.push({amount:"", unit:"g", name:""});
      render();
    });
  });

  document.querySelectorAll("#ingredient-rows input, #ingredient-rows select").forEach(el=>{
    el.addEventListener("input", syncIngredientRowsFromDOM);
    el.addEventListener("change", syncIngredientRowsFromDOM);
  });

  document.getElementById("recipe-form").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const submitBtn = e.target.querySelector("button[type=submit]");
    submitBtn.disabled = true; submitBtn.textContent = "Speichert \u2026";

    syncIngredientRowsFromDOM();
    const cleanRows = state.ingredientRows
      .filter(row => row.name && row.name.trim())
      .map(row => ({
        amount: row.amount !== "" ? parseFloat(row.amount) : null,
        unit: row.unit,
        name: row.name.trim()
      }));

    const ingredientsText = cleanRows.map(row =>
      (row.amount !== null ? row.amount + row.unit + " " : "") + row.name
    ).join("\\n");

    const payload = {
      user_id: state.user.id,
      title: document.getElementById("r-title").value.trim(),
      servings: parseInt(document.getElementById("r-servings").value, 10) || 1,
      ingredients: ingredientsText,
      ingredients_structured: cleanRows,
      steps: document.getElementById("r-steps").value.trim(),
      tags: state.selectedTags,
      kcal: document.getElementById("r-kcal").value !== "" ? parseFloat(document.getElementById("r-kcal").value) : null,
      protein: document.getElementById("r-protein").value !== "" ? parseFloat(document.getElementById("r-protein").value) : null,
      carbs: document.getElementById("r-carbs").value !== "" ? parseFloat(document.getElementById("r-carbs").value) : null,
      fat: document.getElementById("r-fat").value !== "" ? parseFloat(document.getElementById("r-fat").value) : null,
      photo_url: state.photoDataUrl || (state.editingRecipe ? state.editingRecipe.photo_url : null)
    };

    try{
      if(state.editingRecipe){
        const { error } = await sb.from("recipes").update(payload).eq("id", state.editingRecipe.id);
        if(error) throw error;
      } else {
        const { error } = await sb.from("recipes").insert(payload);
        if(error) throw error;
      }
      await loadRecipes();
      closeModal();
    }catch(err){
      alert("Fehler beim Speichern: " + err.message);
      submitBtn.disabled = false; submitBtn.textContent = "Speichern";
    }
  });

  const delBtn = document.getElementById("delete-recipe");
  if(delBtn){
    delBtn.addEventListener("click", async ()=>{
      if(!confirm("Dieses Rezept wirklich l\u00f6schen?")) return;
      const { error } = await sb.from("recipes").delete().eq("id", state.editingRecipe.id);
      if(error){ alert("Fehler: " + error.message); return; }
      await loadRecipes();
      closeModal();
    });
  }
}

function bindDetailEvents(){
  document.getElementById("detail-overlay").addEventListener("click", (e)=>{
    if(e.target.id === "detail-overlay") { state.detailRecipe = null; render(); }
  });
  document.getElementById("detail-close").addEventListener("click", ()=>{
    state.detailRecipe = null; render();
  });
  const minusBtn = document.getElementById("servings-minus");
  const plusBtn = document.getElementById("servings-plus");
  if(minusBtn){
    minusBtn.addEventListener("click", ()=>{
      if(state.detailServings > 1){
        state.detailServings -= 1;
        render();
      }
    });
  }
  if(plusBtn){
    plusBtn.addEventListener("click", ()=>{
      state.detailServings += 1;
      render();
    });
  }
  document.getElementById("edit-from-detail").addEventListener("click", ()=>{
    state.editingRecipe = state.detailRecipe;
    state.selectedTags = [...(state.detailRecipe.tags||[])];
    state.photoDataUrl = state.detailRecipe.photo_url || null;
    state.ingredientRows = (state.detailRecipe.ingredients_structured && state.detailRecipe.ingredients_structured.length)
      ? state.detailRecipe.ingredients_structured.map(row => ({
          amount: row.amount !== null && row.amount !== undefined ? row.amount : "",
          unit: row.unit || "g",
          name: row.name || ""
        }))
      : [{amount:"", unit:"g", name:""}];
    state.detailRecipe = null;
    state.modalOpen = true;
    render();
  });
}

function closeModal(){
  state.modalOpen = false; state.editingRecipe = null; state.photoDataUrl = null; state.selectedTags = [];
  state.ingredientRows = [{amount:"", unit:"g", name:""}];
  render();
}

/* ---------- DATA ---------- */
async function loadRecipes(){
  const { data, error } = await sb.from("recipes")
    .select("*")
    .order("created_at", { ascending:false });
  if(error){ console.error(error); return; }
  state.recipes = data || [];
  render();
}

async function loadWeekLog(){
  const weekDates = getCurrentWeekDates();
  const { data, error } = await sb.from("daily_log")
    .select("*")
    .gte("log_date", weekDates[0])
    .lte("log_date", weekDates[6])
    .order("created_at", { ascending:true });
  if(error){ console.error(error); return; }
  state.weekLog = data || [];
  render();
}

async function loadShoppingChecks(){
  const weekStart = getCurrentWeekDates()[0];
  const { data, error } = await sb.from("shopping_checked")
    .select("*")
    .eq("week_start", weekStart);
  if(error){ console.error(error); return; }
  const map = {};
  (data || []).forEach(row => { map[row.item_key] = row.checked; });
  state.shoppingChecks = map;
  render();
}

async function checkSession(){
  const { data } = await sb.auth.getSession();
  if(data.session){
    state.user = data.session.user;
    state.view = "app";
    await loadRecipes();
  } else {
    state.view = "login";
    render();
  }
}

/* ---------- HELPERS ---------- */
function escapeHtml(str){
  if(!str) return "";
  var map = {};
  map["&"] = "&amp;";
  map["<"] = "&lt;";
  map[">"] = "&gt;";
  map['"'] = "&quot;";
  map["'"] = "&#39;";
  return str.replace(/[&<>"']/g, function(m){ return map[m]; });
}
function escapeAttr(str){ return escapeHtml(str); }

/* ---------- INIT ---------- */
sb.auth.onAuthStateChange((_event, session)=>{
  if(session && state.view !== "app"){
    state.user = session.user;
    state.view = "app";
    loadRecipes();
  }
});

checkSession();
render();
</script>
